name: Build and Push Speedybot
on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: vulcan
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Private Registry
        uses: docker/login-action@v4
        with:
          registry: reg.h.koalaheim.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Cleanup Remote Manifest
        run: |
          echo "Checking for existing :latest manifest..."
          # Removed -u (user/pass) and kept -k for internal SSL/self-signed certs
          DIGEST=$(curl -sI -k \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.manifest.v1+json" \
            "https://reg.h.koalaheim.com/v2/speedybot/manifests/latest" | \
            grep -iE "^Docker-Content-Digest:" | awk '{print $2}' | tr -d '\r\n')
          
          if [ ! -z "$DIGEST" ]; then
            echo "Found Digest: $DIGEST. Deleting old manifest for GC..."
            curl -s -k -X DELETE "https://reg.h.koalaheim.com/v2/speedybot/manifests/$DIGEST"
          else
            echo "No manifest found, proceeding with build."
          fi

      - name: Build and Push AMD64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          # We can now tag with both 'latest' AND the specific release version
          tags: |
            reg.h.koalaheim.com/speedybot:latest
            reg.h.koalaheim.com/speedybot:${{ github.event.release.tag_name }}
